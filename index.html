<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electrofull | Inventory & Sales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loginView" class="login-shell"></div>

    <div id="appView" class="app-shell hidden" aria-live="polite">
      <aside class="sidebar">
        <div class="brand-block">
          <div class="brand-logo">⚙️</div>
          <div>
            <p class="brand-title">Electrofull</p>
            <p class="brand-subtitle">AC Parts & Service</p>
          </div>
        </div>
        <nav>
          <ul id="navMenu" class="nav-menu"></ul>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <h1 id="sectionTitle">Dashboard</h1>
            <p id="sectionSubtitle">Business overview</p>
          </div>
          <div class="user-chip" id="userChip"></div>
        </header>
        <section id="sectionContainer"></section>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
